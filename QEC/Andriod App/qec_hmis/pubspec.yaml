name: qec_hmis
description: Quaid Educational Complex - Higher Management Information System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.2

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_storage: ^12.4.1
  firebase_messaging: ^15.2.1
  cloud_firestore: ^5.6.5

  # UI
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  fl_chart: ^0.70.2
  cached_network_image: ^3.4.1
  lottie: ^3.3.1

  # Utils
  dartz: ^0.10.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.2
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  open_file: ^3.5.10
  pdf: ^3.11.3
  excel: ^4.0.6
  csv: ^6.0.0
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  logger: ^2.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4
  retrofit_generator: ^9.1.7
  hive_generator: ^2.0.1
  mockito: ^5.4.6
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
